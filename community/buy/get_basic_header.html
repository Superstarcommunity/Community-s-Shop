<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>superstar_shop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background-color: #ffffff;
  color: #111111;
  font-family: sans-serif;
  transition: background-color 0.3s, color 0.3s;
}

@media (prefers-color-scheme: dark) {
  html, body { background-color: #312B27; color: #E5DFDB; }
}

/* ── SCROLL SYSTEM (igual ao menu e buy_*.html) ── */
.wrapper-jogo {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 16px 0 16px;
  flex-shrink: 0;
}
.header-top h3 { margin: 0; font-weight: bold; }
.header-top a { text-decoration: none; color: inherit; }

.godot-scroll-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  box-sizing: border-box;
  -webkit-overflow-scrolling: touch !important;
  touch-action: pan-y !important;
}
.godot-scroll-container::-webkit-scrollbar { width: 6px; }
.godot-scroll-container::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 28px 16px 20px;
  border-radius: 16px;
  background: #111111;
  margin-bottom: 24px;
}
.checkmark {
  font-size: 52px;
  display: block;
  animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  margin-bottom: 8px;
}
@keyframes pop {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.hero-title {
  font-size: 22px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.hero-sub {
  font-size: 13px;
  color: #aaaaaa;
  letter-spacing: 0.5px;
}

/* ── IMAGE CARD ── */
.item-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #888;
  margin-bottom: 10px;
}
.img-card {
  background: #f0ecf5;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
}
@media (prefers-color-scheme: dark) {
  .img-card { background: #000000; }
}
.img-label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #999;
  padding: 10px 12px 4px;
}
.preview-img {
  width: 100%;
  height: auto;
  display: block;
}

/* ── DOWNLOAD BUTTONS ── */
.download-section { margin-top: 8px; }
.btn-download {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  margin-bottom: 10px;
  background-color: #000000;
  color: #ffffff;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.3px;
}
@media (prefers-color-scheme: dark) {
  .btn-download { background-color: #ffffff; color: #000000; }
}
.btn-download:active { transform: scale(0.97); opacity: 0.85; }

.footer-note {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-top: 20px;
  padding-bottom: 12px;
  line-height: 1.6;
}
.footer-note a { color: inherit; text-decoration: none; opacity: 0.7; }
</style>
</head>
<body>

<div class="wrapper-jogo">

  <div class="header-top">
    <a href="javascript:history.back()"><h3>Avatar Frame</h3></a>
  </div>

  <div class="godot-scroll-container">

    <div class="hero">
      <span class="checkmark">⭐</span>
      <p class="hero-title">PURCHASE COMPLETE!</p>
      <p class="hero-sub">Basic Avatar Frame</p>
    </div>

    <p class="item-label">Your item</p>
        <div class="img-card">
          <span class="img-label">Avatar Frame</span>
          <img class="preview-img" src="get/basic_header.png" alt="Basic Avatar Frame">
        </div>

    <div class="download-section">
        <a class="btn-download" href="get/basic_header.png" download>⬇ Download Avatar Frame</a>
    </div>

    <p class="footer-note">
      Long-press the image to save on mobile.<br>
      <a href="https://gamejolt.com/c/SSC-7x3z65/events">Get more Stardust →</a>
    </p>

  </div>
</div>

</body>
</html>
